name: Cloudflare Pages

# 静的サイトをビルドなしで Cloudflare Pages へデプロイする。
# - develop / main への push → 本番（または該当ブランチ）デプロイ
# - PR → プレビューデプロイ + プレビューURLをPRにコメント
#
# 事前準備（リポジトリの Settings → Secrets and variables → Actions）:
#   CLOUDFLARE_API_TOKEN  … Pages の編集権限を持つ API トークン
#   CLOUDFLARE_ACCOUNT_ID … Cloudflare アカウントID
# また Cloudflare 側に Pages プロジェクト「images-to-pdf」を用意しておく
# （未作成でも wrangler が初回に作成を試みます）。

on:
  push:
    branches: [develop, main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  deployments: write

# 同一ブランチの古い実行はキャンセル
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ビルド不要。VCS/CI 用ファイルを除いた静的ファイルだけを dist/ に集める。
      - name: Stage static files
        run: |
          mkdir -p dist
          rsync -a --exclude='.git' --exclude='.github' --exclude='dist' ./ dist/

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=images-to-pdf
            --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deployment-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const marker = '<!-- cf-pages-preview -->';
            const body = `${marker}\n🚀 **Cloudflare Pages プレビュー**\n\n${url}\n\n_(コミットごとに更新されます)_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
